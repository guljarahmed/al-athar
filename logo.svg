  <line x1="10" y1="24" x2="21" y2="21" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
  <line x1="10" y1="28" x2="21" y2="25" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
  <!-- Right page lines -->
